<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scan Tickets</title>
    <link rel="stylesheet" href="output.css" />
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
      .badge {
        margin: 30px;
      }
      .card {
        align-self: center;
        margin-left: 12px;
      }
      .btn {
        margin-top: 30px;
      }
      h2 {
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="navbar bg-base-100 shadow-sm.flex">
      <div class="navbar-start">
        <a class="btn btn-ghost text-xl hero-section__title">Scan Tickets</a>
      </div>
      <div class="navbar-end">
        <a class="btn btn-primary" style="margin-right: 20px" href="admin.html"
          >Dashboard</a
        >
        <a class="btn" href="login.html">Logout</a>
      </div>
    </div>
    <div class="badge badge-accent" id="status">Loading…</div>
    <div
      class="card bg-base-100 text-primary-content card-xl shadow-sm w-96"
      id="reader-div"
    >
      <div class="card-body" id="reader"></div>
    </div>
    <div class="card bg-base-100 text-primary-content card-xl shadow-sm w-96">
      <div class="card-body" id="result"></div>
    </div>

    <script>
      const token = localStorage.getItem("staffToken");
      if (!token) {
        window.location.href = "login.html";
      }

      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const readerDiv = document.getElementById("reader-div");

      let qr = null;
      let isBusy = false;
      let isPaused = false;
      let currentTicketToken = null;

      resultEl.style.display = "none";

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function setResultHtml(html) {
        resultEl.style.display = "block";
        resultEl.innerHTML = html;
        readerDiv.style.display = "none";
      }

      function clearResult() {
        resultEl.innerHTML = "";
        resultEl.style.display = "none";
        readerDiv.style.display = "block";
      }

      async function pauseScanner() {
        if (qr && !isPaused) {
          qr.pause(true);
          isPaused = true;
        }
      }

      async function resumeScanner() {
        if (qr && isPaused) {
          qr.resume();
          isPaused = false;
        }
      }

      function wireCloseButton() {
        const closeBtn = document.getElementById("closeResult");
        if (!closeBtn) return;

        closeBtn.addEventListener("click", async () => {
          clearResult();
          statusEl.textContent = "Point camera at a QR code";
          currentTicketToken = null;
          await resumeScanner();
        });
      }

      async function handleConfirmCheckIn() {
        const checkinBtn = document.getElementById("confirmCheckin");
        const closeBtn = document.getElementById("closeResult");
        if (!checkinBtn || !currentTicketToken) return;

        checkinBtn.disabled = true;
        if (closeBtn) closeBtn.disabled = true;
        checkinBtn.textContent = "Checking in...";

        try {
          const res = await fetch("/api/checkin", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ token: currentTicketToken, confirm: true }),
          });

          if (res.status === 401) {
            setResultHtml(`
              <h2 class="card-title">Sorry!</h2>
              <p>
                Your session expired. Please log in again.
              </p>
              <div class="card-actions justify-end">
                <button class="btn" id="goLogin">Log in</button>
              </div>
            `);
            const loginBtn = document.getElementById("goLogin");
            if (loginBtn) {
              loginBtn.addEventListener("click", () => {
                window.location.href = "login.html";
              });
            }
            return;
          }

          const data = await res.json();
          if (!res.ok) {
            if (res.status === 409) {
              setResultHtml(`
                <h2 class="card-title">Oops!</h2>
                <p>
                  Checked in: ${escapeHtml(data.fullName)} (${escapeHtml(data.email || "no-email")})
                </p>
                <div class="card-actions justify-end">
                  <button class="btn" id="closeResult">Scan Next</button>
                </div>
              `);
              wireCloseButton();
              return;
            }

            setResultHtml(
              `<h2 class="card-title">Sorry!</h2>
              <p>
                ${escapeHtml(data.message || data.error || "Could not check in this ticket")}
              </p>`,
            );
            wireCloseButton();
            return;
          }
        } catch (err) {
          setResultHtml(`
            <h2 class="card-title">Sorry!</h2>
            <p>
              Network error while confirming check-in. Please try again.
            </p>
            <div class="card-actions justify-end">
              <button class="btn btn-primary" id="closeResult">Close</button>
            </div>
          `);
          wireCloseButton();
        }
      }

      function showPreview(data) {
        const fullName = escapeHtml(data.fullName || "Unknown guest");
        const email = escapeHtml(data.email || "no-email");

        if (data.result === "valid") {
          setResultHtml(`
            <h2 class="card-title">Success!</h2>
            <p>
              ${fullName}'s ticket is valid, click the button to check in. 
              Click the close button if you change your mind.
            </p>
            <div class="card-actions justify-end">
              <button class="btn" id="closeResult">Close</button>
              <button class="btn btn-primary" id="confirmCheckin">Check In</button>
            </div>
          `);

          const checkinBtn = document.getElementById("confirmCheckin");
          if (checkinBtn) {
            checkinBtn.addEventListener("click", handleConfirmCheckIn);
          }
          wireCloseButton();
          return;
        }

        if (data.result === "already_used") {
          setResultHtml(`
            <h2 class="card-title">Nahhh!</h2>
            <p>
              ${fullName}'s ticket is already scanned.
            </p>
            <div class="card-actions justify-end">
              <button class="btn" id="closeResult">Close</button>
            </div>
          `);
          wireCloseButton();
          return;
        }

        setResultHtml(`
          <h2 class="card-title">Naahh! Invalid QR code</h2>
          <p>
            This ticket is not recognized.
          </p>
          <div class="card-actions justify-end">
            <button class="btn" id="closeResult">Close</button>
          </div>
        `);
        wireCloseButton();
      }

      async function onScanSuccess(decodedText) {
        if (isBusy) return;
        isBusy = true;
        currentTicketToken = decodedText;

        await pauseScanner();
        statusEl.textContent = "Scan paused while reviewing ticket";
        setResultHtml(`
          <h2 class="card-title">In a minute!</h2>
          <p>
            Checking the QR code
          </p>
        `);

        try {
          const res = await fetch("/api/checkin", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ token: decodedText, confirm: false }),
          });

          if (res.status === 401) {
            setResultHtml(`
              <h2 class="card-title">Sorry..</h2>
              <p>
                Your session expired. Please log in again.
              </p>
              <div class="card-actions justify-end">
                <button class="btn" id="goLogin">Log in</button>
              </div>
            `);
            const loginBtn = document.getElementById("goLogin");
            if (loginBtn) {
              loginBtn.addEventListener("click", () => {
                window.location.href = "login.html";
              });
            }
            return;
          }

          const data = await res.json();
          showPreview(data);
        } catch (err) {
          setResultHtml(`
            <h2 class="card-title">Oops!</h2>
            <p>
              Network error while checking ticket...
              Try again later.
            </p>
            <div class="card-actions justify-end">
              <button class="btn" id="closeResult">Close</button>
            </div>
          `);
          wireCloseButton();
        } finally {
          isBusy = false;
        }
      }

      if (typeof Html5Qrcode === "undefined") {
        statusEl.textContent =
          "Could not load scanner library. Check your internet and refresh.";
      } else {
        qr = new Html5Qrcode("reader");
        qr.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 150 },
          onScanSuccess,
        )
          .then(() => {
            statusEl.textContent = "Point camera at a QR code";
          })
          .catch((err) => {
            statusEl.textContent = "Could not start camera: " + err;
          });
      }
    </script>
  </body>
</html>
