<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scan Tickets</title>
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  </head>
  <body>
    <section>
      <h1 class="hero-section__title">Scan Ticket</h1>
      <p>
        <a href="login.html" style="margin: 10px"> Logout </a>
        <a href="admin.html" class="button-on-dark button-on-dark--dark-subtle">
          <span class="button-on-dark__label">Admin Dashboard</span>
        </a>
      </p>
    </section>
    <section class="scanner-section">
      <div id="reader-div">
        <p id="status">Starting camera…</p>
        <div id="reader"></div>
      </div>
      <div id="result"></div>
    </section>

    <script>
      const token = localStorage.getItem("staffToken");
      if (!token) {
        window.location.href = "login.html";
      }

      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const readerDiv = document.getElementById("reader-div");

      let qr = null;
      let isBusy = false;
      let isPaused = false;
      let currentTicketToken = null;

      resultEl.style.display = "none";

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function setResultHtml(html) {
        resultEl.style.display = "block";
        resultEl.innerHTML = html;
        readerDiv.style.display = "none";
      }

      function clearResult() {
        resultEl.innerHTML = "";
        resultEl.style.display = "none";
        readerDiv.style.display = "block";
      }

      async function pauseScanner() {
        if (qr && !isPaused) {
          qr.pause(true);
          isPaused = true;
        }
      }

      async function resumeScanner() {
        if (qr && isPaused) {
          qr.resume();
          isPaused = false;
        }
      }

      function wireCloseButton() {
        const closeBtn = document.getElementById("closeResult");
        if (!closeBtn) return;

        closeBtn.addEventListener("click", async () => {
          clearResult();
          statusEl.textContent = "Point camera at a QR code";
          currentTicketToken = null;
          await resumeScanner();
        });
      }

      async function handleConfirmCheckIn() {
        const checkinBtn = document.getElementById("confirmCheckin");
        const closeBtn = document.getElementById("closeResult");
        if (!checkinBtn || !currentTicketToken) return;

        checkinBtn.disabled = true;
        if (closeBtn) closeBtn.disabled = true;
        checkinBtn.textContent = "Checking in...";

        try {
          const res = await fetch("/api/checkin", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ token: currentTicketToken, confirm: true }),
          });

          if (res.status === 401) {
            setResultHtml(`
              <div class="scan-result invalid">Your session expired. Please log in again.</div>
              <button class="button-on-dark" id="goLogin">Log in</button>
            `);
            const loginBtn = document.getElementById("goLogin");
            if (loginBtn) {
              loginBtn.addEventListener("click", () => {
                window.location.href = "login.html";
              });
            }
            return;
          }

          const data = await res.json();
          if (!res.ok) {
            setResultHtml(
              `<div class="scan-result invalid">${escapeHtml(data.message || data.error || "Could not check in this ticket")}</div>`,
            );
            wireCloseButton();
            return;
          }

          setResultHtml(`
            <div class="scan-result valid">
              Checked in: ${escapeHtml(data.fullName)} (${escapeHtml(data.email || "no-email")})
            </div>
            <button class="button-on-dark" id="closeResult">Scan Next</button>
          `);
          wireCloseButton();
        } catch (err) {
          setResultHtml(`
            <div class="scan-result invalid">Network error while confirming check-in. Please try again.</div>
            <button class="button-on-dark" id="closeResult">Close</button>
          `);
          wireCloseButton();
        }
      }

      function showPreview(data) {
        const fullName = escapeHtml(data.fullName || "Unknown guest");
        const email = escapeHtml(data.email || "no-email");

        if (data.result === "valid") {
          setResultHtml(`
            <div class="scan-result valid">Valid ticket</div>
            <p><strong>Name:</strong> ${fullName}</p>
            <p><strong>Email:</strong> ${email}</p>
            <p><strong>Status:</strong> Valid (ready to check in)</p>
            <button class="button-on-dark" id="confirmCheckin">Check In</button>
            <button class="button-on-dark button-on-dark--dark-subtle" id="closeResult">Close</button>
          `);

          const checkinBtn = document.getElementById("confirmCheckin");
          if (checkinBtn) {
            checkinBtn.addEventListener("click", handleConfirmCheckIn);
          }
          wireCloseButton();
          return;
        }

        if (data.result === "already_used") {
          setResultHtml(`
            <div class="scan-result already_used">Already scanned</div>
            <p><strong>Name:</strong> ${fullName}</p>
            <p><strong>Email:</strong> ${email}</p>
            <p><strong>Status:</strong> Already used</p>
            <button class="button-on-dark" id="closeResult">Close</button>
          `);
          wireCloseButton();
          return;
        }

        setResultHtml(`
          <div class="scan-result invalid">Invalid QR code</div>
          <p><strong>Status:</strong> Not recognized</p>
          <button class="button-on-dark" id="closeResult">Close</button>
        `);
        wireCloseButton();
      }

      async function onScanSuccess(decodedText) {
        if (isBusy) return;
        isBusy = true;
        currentTicketToken = decodedText;

        await pauseScanner();
        statusEl.textContent = "Scan paused while reviewing ticket";
        setResultHtml(`<div class="scan-result">Checking ticket...</div>`);

        try {
          const res = await fetch("/api/checkin", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ token: decodedText, confirm: false }),
          });

          if (res.status === 401) {
            setResultHtml(`
              <div class="scan-result invalid">Your session expired. Please log in again.</div>
              <button class="button-on-dark" id="goLogin">Log in</button>
            `);
            const loginBtn = document.getElementById("goLogin");
            if (loginBtn) {
              loginBtn.addEventListener("click", () => {
                window.location.href = "login.html";
              });
            }
            return;
          }

          const data = await res.json();
          showPreview(data);
        } catch (err) {
          setResultHtml(`
            <div class="scan-result invalid">Network error while checking ticket.</div>
            <button class="button-on-dark" id="closeResult">Close</button>
          `);
          wireCloseButton();
        } finally {
          isBusy = false;
        }
      }

      if (typeof Html5Qrcode === "undefined") {
        statusEl.textContent =
          "Could not load scanner library. Check your internet and refresh.";
      } else {
        qr = new Html5Qrcode("reader");
        qr.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 450 },
          onScanSuccess,
        )
          .then(() => {
            statusEl.textContent = "Point camera at a QR code";
          })
          .catch((err) => {
            statusEl.textContent = "Could not start camera: " + err;
          });
      }
    </script>
  </body>
</html>
