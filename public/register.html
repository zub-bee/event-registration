<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="output.css" />
    <!-- <link rel="stylesheet" href="./dist/output.css" /> -->
  </head>
  <body>
    <div class="hero bg-base-200 min-h-screen">
      <div class="hero-content flex-col lg:flex-row-reverse">
        <div class="text-center lg:text-left">
          <h1 class="text-5xl font-bold">Login now!</h1>
          <p class="py-6">
            Provident cupiditate voluptatem et in. Quaerat fugiat ut assumenda
            excepturi exercitationem quasi. In deleniti eaque aut repudiandae et
            a id nisi.
          </p>
        </div>
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
          <div class="card-body">
            <fieldset class="fieldset">
              <label class="label">Email</label>
              <input type="email" class="input" placeholder="Email" />
              <label class="label">Password</label>
              <input type="password" class="input" placeholder="Password" />
              <div><a class="link link-hover">Forgot password?</a></div>
              <button class="btn btn-neutral mt-4">Login</button>
            </fieldset>
          </div>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("regForm");
      const submitBtn = document.getElementById("submitBtn");
      const spotsText = document.getElementById("spotsText");
      const msg = document.getElementById("msg");

      function showMessage(text, type) {
        msg.innerHTML = `<div class="message ${type}">${text}</div>`;
      }

      async function loadStatus() {
        try {
          const res = await fetch("/api/status");
          const data = await res.json();
          if (data.closed) {
            spotsText.textContent = `Registration is closed - all ${data.capacity} spots are filled.`;
            form.style.display = "none";
          } else {
            spotsText.textContent = `${data.remaining} of ${data.capacity} spots remaining.`;
          }
        } catch (err) {
          spotsText.textContent =
            "Availability details are temporarily unavailable.";
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.textContent = "Registering…";
        msg.innerHTML = "";

        const fullName = document.getElementById("fullName").value;
        const email = document.getElementById("email").value;

        try {
          const res = await fetch("/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ fullName, email }),
          });
          const data = await res.json();

          if (!res.ok) {
            showMessage(data.error || "Something went wrong.", "error");
            submitBtn.disabled = false;
            submitBtn.querySelector(".stack-label").textContent =
              "Get Your Invite";
            submitBtn.querySelector(".stack-value").textContent =
              "Check your email address";
            loadStatus();
            return;
          }

          window.location.href = "success.html";
        } catch (err) {
          showMessage("Network error — please try again.", "error");
          submitBtn.disabled = false;
          submitBtn.querySelector(".stack-label").textContent =
            "Get Your Invite";
          submitBtn.querySelector(".stack-value").textContent =
            "Check your email address";
        }
      });

      loadStatus();
    </script>
  </body>
</html>
