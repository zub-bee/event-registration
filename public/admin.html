<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="output.css" />
    <!-- <link rel="stylesheet" href="style.css" /> -->
    <style>
      .badge {
        margin: 30px;
        font-size: large;
      }
      .card {
        align-self: center;
        margin-left: 12px;
      }
      .btn {
        margin-top: 30px;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="navbar bg-base-100 shadow-sm.flex">
        <div class="navbar-start">
          <a class="btn btn-ghost text-xl hero-section__title"
            >Admin <br />Dashboard</a
          >
        </div>
        <div class="navbar-end">
          <a
            class="btn btn-primary"
            style="margin-right: 20px"
            href="scanner.html"
            >Scan Invites</a
          >
          <a class="btn" href="login.html">Logout</a>
        </div>
      </div>
      <div class="badge badge-accent" id="summary">Loading…</div>
      <div
        class="overflow-x-auto rounded-box border border-base-content/5 bg-base-100"
      >
        <table class="table">
          <thead>
            <tr>
              <th></th>
              <th>Name</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <script>
      const token = localStorage.getItem("staffToken");
      if (!token) {
        window.location.href = "login.html";
      }

      async function load() {
        const res = await fetch("/api/admin/registrations", {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (res.status === 401) {
          window.location.href = "login.html";
          return;
        }

        const data = await res.json();
        document.getElementById("summary").textContent =
          `${data.checkedIn} out of ${data.capacity} checked in ....... ${data.total} registered`;

        let count = 1;
        const rows = data.registrations
          .map(
            (r) => `
        <tr>
          <th>${count++}</th>
          <td>${r.fullName}</td>
          <td>${r.status === "used" ? "Checked in" : "Invited"}</td>
        </tr>
      `,
          )
          .join("");

        document.getElementById("rows").innerHTML = rows;
      }

      load();
      setInterval(load, 5000); // auto-refresh every 5s
    </script>
  </body>
</html>
